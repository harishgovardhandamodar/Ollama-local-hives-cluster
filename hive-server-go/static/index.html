<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hive Server Go – Dashboard</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0c10;--surface:#12141a;--surface2:#1a1d27;--border:#262933;--border-light:#30333f;--text:#e4e6ed;--text2:#9ba0b0;--text3:#6b7084;--accent:#58a6ff;--accent2:#39d2c0;--accent3:#bc8cff;--green:#2ea043;--orange:#f0883e;--red:#f85149;--grad1:linear-gradient(135deg,#58a6ff,#39d2c0);--grad2:linear-gradient(135deg,#bc8cff,#58a6ff);--grad3:linear-gradient(135deg,#f0883e,#f85149);--shadow:0 2px 16px rgba(0,0,0,.3);--glow-blue:0 0 20px rgba(88,166,255,.15);--glow-green:0 0 20px rgba(46,160,67,.15)}
.light-theme{--bg:#f6f8fa;--surface:#ffffff;--surface2:#eef1f5;--border:#d0d7de;--border-light:#afb8c1;--text:#1f2328;--text2:#656d76;--text3:#656d76;--accent:#0969da;--accent2:#1a7f37;--accent3:#8250df;--green:#1a7f37;--orange:#9a6700;--red:#cf222e;--grad1:linear-gradient(135deg,#0969da,#1a7f37);--grad2:linear-gradient(135deg,#8250df,#0969da);--grad3:linear-gradient(135deg,#9a6700,#cf222e);--shadow:0 2px 16px rgba(31,35,40,.12);--glow-blue:0 0 20px rgba(9,105,218,.1);--glow-green:0 0 20px rgba(26,127,55,.08)}
.light-theme .header{background:rgba(255,255,255,.9)}
.light-theme body::before{background:radial-gradient(ellipse at 20% 30%,rgba(9,105,218,.03) 0%,transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(26,127,55,.02) 0%,transparent 50%)}
.light-theme .audit-request{background:var(--surface)}
.light-theme .audit-request-header:hover{background:rgba(9,105,218,.04)}
.light-theme .audit-request{margin-bottom:6px}
.light-theme .audit-event-content-text{background:var(--surface2)}
.light-theme .overlay-content{background:var(--surface)}
.light-theme .overlay-header{background:var(--surface)}
.theme-toggle{font-size:14px;cursor:pointer;padding:2px 6px;border-radius:6px;transition:all .2s;background:var(--surface2);border:1px solid var(--border);line-height:1;display:flex;align-items:center}
.theme-toggle:hover{background:var(--border);border-color:var(--border-light);transform:scale(1.1)}
.light-theme .theme-toggle{background:var(--surface);border-color:var(--border)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 30%,rgba(88,166,255,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(57,210,192,.03) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(188,140,255,.02) 0%,transparent 50%);pointer-events:none;z-index:0}
.header{position:relative;z-index:1;background:rgba(18,20,26,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header h1{font-size:17px;font-weight:700;background:var(--grad1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .badge{font-size:9px;padding:2px 9px;border-radius:10px;background:var(--accent);color:#fff;font-weight:600;letter-spacing:.2px}
.header .badge.mesh{background:var(--accent3)}
.header .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;position:relative}
.header .status-dot.ok{background:var(--green);box-shadow:0 0 10px rgba(46,160,67,.5)}
.header .status-dot.ok::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:1px solid rgba(46,160,67,.2);animation:pulse-ring 2s ease-in-out infinite}
.header .status-dot.err{background:var(--red);box-shadow:0 0 10px rgba(248,81,73,.5)}
.header .meta{margin-left:auto;font-size:10px;color:var(--text3);display:flex;gap:16px;align-items:center;flex-wrap:wrap}

.layout{display:flex;gap:0;height:calc(100vh - 53px);position:relative;z-index:1}
.main{flex:1;overflow-y:auto;padding:16px 20px;min-width:0;scroll-behavior:smooth}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.divider{width:4px;cursor:col-resize;flex-shrink:0;background:transparent;position:relative;transition:background .2s;z-index:10}
.divider:hover,.divider.active{background:var(--accent);box-shadow:0 0 12px rgba(88,166,255,.3)}
.divider::after{content:'';position:absolute;top:50%;left:50%;width:2px;height:32px;margin:-16px 0 0 -1px;background:var(--border-light);border-radius:2px;transition:all .2s}
.divider:hover::after,.divider.active::after{background:var(--accent)}
.sidebar{width:var(--sidebar-width,420px);flex-shrink:0;overflow-y:auto;padding:16px 16px 16px 0;border-left:1px solid var(--border);display:flex;flex-direction:column;gap:14px}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.sidebar .card:hover{border-color:var(--border-light);box-shadow:var(--shadow)}
.sidebar .card h2{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;overflow:hidden;transition:border-color .2s,box-shadow .2s,transform .2s}
.card:hover{border-color:var(--border-light);box-shadow:var(--shadow)}
.card h2{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h2 .count{font-size:17px;font-weight:700;color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 8px;color:var(--text3);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border)}
td{padding:6px 8px;border-bottom:1px solid rgba(38,41,51,.6);vertical-align:middle}
tr{transition:background .15s}
tr:hover td{background:rgba(88,166,255,.04)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.dot.connected{background:var(--green);box-shadow:0 0 6px rgba(46,160,67,.4)}
.dot.stale{background:var(--orange);box-shadow:0 0 6px rgba(240,136,62,.4)}
.dot.disconnected{background:var(--red)}
.status-tag{font-size:8px;padding:2px 7px;border-radius:8px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;transition:all .2s}
.status-tag.pending{background:rgba(240,136,62,.12);color:var(--orange);border:1px solid rgba(240,136,62,.25)}
.status-tag.running{background:rgba(88,166,255,.12);color:var(--accent);border:1px solid rgba(88,166,255,.25)}
.status-tag.completed{background:rgba(46,160,67,.12);color:var(--green);border:1px solid rgba(46,160,67,.25)}
.status-tag.failed{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.25)}
.status-tag.mesh{background:rgba(188,140,255,.12);color:var(--accent3);border:1px solid rgba(188,140,255,.25);margin-left:4px}
.job-type{font-weight:600;color:var(--text);font-size:11px}
.job-id{font-family:monospace;font-size:9px;color:var(--text3);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.job-time{font-size:9px;color:var(--text3)}
.progress-wrap{display:flex;align-items:center;gap:10px;margin-top:8px}
.progress-bar{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);background:var(--grad1);background-size:200% 100%;animation:shimmer 2s ease-in-out infinite}
.progress-label{font-size:10px;color:var(--text2);white-space:nowrap}
.stat-row{display:flex;gap:10px;flex-wrap:wrap}
.stat-box{flex:1;min-width:80px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 10px;text-align:center;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.stat-box:hover{border-color:var(--border-light);transform:translateY(-1px);box-shadow:var(--shadow)}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .25s}
.stat-box:hover::before{opacity:1}
.stat-box.blue::before{background:var(--accent);box-shadow:0 0 12px rgba(88,166,255,.4)}
.stat-box.green::before{background:var(--green);box-shadow:0 0 12px rgba(46,160,67,.4)}
.stat-box.orange::before{background:var(--orange);box-shadow:0 0 12px rgba(240,136,62,.4)}
.stat-box.purple::before{background:var(--accent3);box-shadow:0 0 12px rgba(188,140,255,.4)}
.stat-box.cyan::before{background:var(--accent2);box-shadow:0 0 12px rgba(57,210,192,.4)}
.stat-box .num{font-size:22px;font-weight:700;line-height:1.2;transition:color .2s}
.stat-box .lbl{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.stat-box.blue .num{color:var(--accent)}
.stat-box.green .num{color:var(--green)}
.stat-box.orange .num{color:var(--orange)}
.stat-box.red .num{color:var(--red)}
.stat-box.purple .num{color:var(--accent3)}
.stat-box.cyan .num{color:var(--accent2)}
.empty{text-align:center;padding:20px;color:var(--text3);font-size:11px}
.log-panel{background:var(--bg);border:1px solid var(--border);border-radius:8px;max-height:260px;overflow-y:auto;font-family:monospace;font-size:10px;padding:4px 6px}
.log-panel::-webkit-scrollbar{width:4px}
.log-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.log-line{padding:2px 4px;border-bottom:1px solid rgba(38,41,51,.4);display:flex;gap:6px;line-height:1.6;transition:background .1s}
.log-line:hover{background:rgba(88,166,255,.03)}
.log-line .ts{color:var(--text3);flex-shrink:0}
.log-line .lvl{flex-shrink:0;width:36px;font-weight:600}
.log-line .lvl.INFO{color:var(--accent)}
.log-line .lvl.WARN{color:var(--orange)}
.log-line .lvl.ERROR{color:var(--red)}
.log-line .msg{color:var(--text);word-break:break-all;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-filter{font-size:8px;padding:1px 8px;border-radius:8px;cursor:pointer;color:var(--text3);border:1px solid transparent;transition:all .2s}
.log-filter:hover{color:var(--text);border-color:var(--border-light)}
.log-filter.active{color:var(--accent);border-color:var(--accent);background:rgba(88,166,255,.1)}
.chart-tab{font-size:8px;padding:1px 7px;border-radius:4px;cursor:pointer;color:var(--text3);border:1px solid transparent;transition:all .2s}
.chart-tab:hover{color:var(--text);border-color:var(--border-light)}
.chart-tab.active{color:var(--accent2);border-color:var(--accent2);background:rgba(57,210,192,.08)}
.range-tab{font-size:8px;padding:1px 6px;border-radius:4px;cursor:pointer;color:var(--text3);border:1px solid transparent;transition:all .2s;font-family:monospace}
.range-tab:hover{color:var(--text);border-color:var(--border-light)}
.range-tab.active{color:var(--orange);border-color:var(--orange);background:rgba(240,136,62,.08)}
.audit-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.audit-tag{font-size:9px;padding:2px 8px;border-radius:10px;background:rgba(88,166,255,.15);color:var(--accent);margin-right:6px}
.audit-tag.model{background:rgba(188,140,255,.15);color:var(--accent3)}
.audit-request{background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.audit-request:hover{border-color:var(--border-light)}
.audit-request-header{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .15s}
.audit-request-header:hover{background:rgba(88,166,255,.04)}
.audit-toggle{font-size:10px;color:var(--text3);width:16px;flex-shrink:0}
.audit-request-id{font-family:monospace;font-size:9px;color:var(--text3);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.audit-request-method{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(57,210,192,.15);color:var(--accent2);flex-shrink:0}
.audit-request-path{font-family:monospace;font-size:10px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.audit-request-time{font-size:9px;color:var(--text3);flex-shrink:0}
.audit-request-duration{font-size:9px;color:var(--accent);flex-shrink:0}
.audit-request-events{font-size:9px;color:var(--text3);flex-shrink:0}
.audit-request-details{padding:0 12px 12px;border-top:1px solid var(--border)}
.audit-request-meta{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.audit-timeline{position:relative;padding-left:20px}
.audit-event{position:relative;padding-bottom:16px}
.audit-event:last-child .audit-event-line{display:none}
.audit-event-dot{position:absolute;left:-24px;top:4px;width:10px;height:10px;border-radius:50%;z-index:1}
.audit-event-line{position:absolute;left:-20px;top:14px;width:2px;height:calc(100% - 10px);background:var(--border)}
.audit-event-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.audit-event-icon{font-size:12px}
.audit-event-type{font-size:9px;font-weight:700;letter-spacing:.3px}
.audit-event-time{font-size:9px;color:var(--text3);font-family:monospace}
.audit-event-status{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(0,0,0,.3)}
.audit-event-duration{font-size:9px;color:var(--text3);font-family:monospace}
.audit-event-content-text{font-size:10px;color:var(--text2);line-height:1.5;word-break:break-word;background:var(--bg);padding:6px 8px;border-radius:4px;border:1px solid var(--border);margin-top:4px}
.audit-event-error{font-size:10px;color:var(--red);background:rgba(248,81,73,.1);padding:6px 8px;border-radius:4px;border:1px solid rgba(248,81,73,.2);margin-top:4px}
.audit-request-prompt{font-size:9px;color:var(--text2);font-style:italic;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:2}
.audit-request.highlight-chat{border-left:3px solid var(--accent)}
.audit-request.highlight-error{border-left:3px solid var(--red)}
.audit-request.highlight-streaming{border-left:3px solid var(--accent3);animation:pulse-glow 2s ease-in-out infinite}
.audit-tag.streaming{background:rgba(188,140,255,.15);color:var(--accent3);font-weight:700}
@keyframes pulse-glow{0%,100%{border-left-color:var(--accent3)}50%{border-left-color:var(--accent)}}

/* Overlay Modal */
.overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.overlay.active{display:flex}
.overlay-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:90%;max-width:900px;max-height:85vh;overflow-y:auto;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.overlay-close{position:absolute;top:12px;right:16px;font-size:18px;color:var(--text3);cursor:pointer;background:none;border:none;z-index:2;padding:4px 8px;border-radius:4px;transition:all .2s}
.overlay-close:hover{color:var(--text);background:var(--surface2)}
.overlay-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;border-radius:12px 12px 0 0}
.overlay-header h2{font-size:14px;color:var(--text);margin-bottom:6px}
.overlay-header .meta{display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:var(--text3)}
.overlay-header .meta span{display:flex;align-items:center;gap:4px}
.overlay-body{padding:20px 24px 24px}

.overlay-section{margin-bottom:20px}
.overlay-section h3{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.overlay-section .content-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:monospace;font-size:11px;color:var(--text2);line-height:1.6;max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
.overlay-section .content-block::-webkit-scrollbar{width:4px}
.overlay-section .content-block::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Timeline in Overlay */
.overlay-timeline{position:relative;padding-left:28px;margin-top:8px}
.overlay-timeline-event{position:relative;padding:0 0 20px 0}
.overlay-timeline-event:last-child{padding-bottom:0}
.overlay-timeline-event:last-child .ov-tl-line{display:none}
.ov-tl-dot{position:absolute;left:-28px;top:4px;width:12px;height:12px;border-radius:50%;z-index:1;display:flex;align-items:center;justify-content:center;font-size:7px}
.ov-tl-line{position:absolute;left:-23px;top:16px;width:2px;height:calc(100% - 4px);background:var(--border)}
.ov-tl-expand{font-size:9px;padding:2px 8px;border-radius:4px;cursor:pointer;color:var(--accent);background:rgba(88,166,255,.1);border:1px solid transparent;transition:all .2s;display:inline-flex;align-items:center;gap:4px;margin-top:4px}
.ov-tl-expand:hover{background:rgba(88,166,255,.2)}
.ov-tl-body{display:none;margin-top:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-family:monospace;font-size:10px;color:var(--text2);line-height:1.5;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto}
.ov-tl-stats{display:flex;gap:12px;flex-wrap:wrap;font-size:10px;color:var(--text3);margin-top:4px}
.ov-tl-stats span{display:flex;align-items:center;gap:3px}
.ov-tl-icon{font-size:12px;margin-right:4px}
.tabs{display:flex;gap:0;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;border-radius:12px 12px 0 0}
.tab-btn{background:none;border:none;padding:8px 14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .25s}
.tab-btn:hover{color:var(--text);background:rgba(88,166,255,.04)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(88,166,255,.06)}
.tab-content{display:none;padding:0;animation:fade-in .25s ease-out}
.tab-content.active{display:block}
.log-header{display:flex;align-items:center;gap:6px;padding:4px 8px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);flex-shrink:0}
.log-header .spacer{flex:1}
.log-header button{background:none;border:1px solid var(--border);color:var(--text3);font-size:8px;padding:1px 6px;border-radius:4px;cursor:pointer;transition:all .2s}
.log-header button:hover{color:var(--text);border-color:var(--border-light)}
.mesh-topo{width:100%;height:200px;overflow:hidden;position:relative}
.mesh-topo svg{width:100%;height:100%;filter:drop-shadow(0 0 8px rgba(88,166,255,.06))}
.peer-load-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:4px;width:60px;display:inline-block;vertical-align:middle}
.peer-load-fill{height:100%;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.provider-badge{font-size:8px;padding:2px 7px;border-radius:6px;font-weight:600;display:inline-block;margin:1px;transition:all .2s}
.provider-badge.ollama{background:rgba(88,166,255,.12);color:var(--accent);border:1px solid rgba(88,166,255,.25)}
.provider-badge.lm_studio{background:rgba(240,136,62,.12);color:var(--orange);border:1px solid rgba(240,136,62,.25)}
.provider-badge.vllm{background:rgba(188,140,255,.12);color:var(--accent3);border:1px solid rgba(188,140,255,.25)}
.provider-badge.openai_compatible{background:rgba(46,160,67,.12);color:var(--green);border:1px solid rgba(46,160,67,.25)}
.provider-badge.custom{background:rgba(155,160,176,.12);color:var(--text2);border:1px solid rgba(155,160,176,.25)}
.serving-type{font-size:7px;padding:1px 6px;border-radius:4px;font-weight:600;display:inline-block;letter-spacing:.2px}
.serving-type.gpu{background:rgba(188,140,255,.12);color:var(--accent3);border:1px solid rgba(188,140,255,.25)}
.serving-type.cpu{background:rgba(155,160,176,.12);color:var(--text2);border:1px solid rgba(155,160,176,.25)}
.serving-type.mlx{background:rgba(46,160,67,.12);color:var(--green);border:1px solid rgba(46,160,67,.25)}
.model-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.model-tag{font-size:8px;padding:2px 8px;border-radius:8px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);cursor:default;transition:all .2s}
.model-tag:hover{border-color:var(--accent);color:var(--text);background:rgba(88,166,255,.06)}
.node-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:6px;transition:all .2s}
.node-card:hover{border-color:var(--border-light)}
.node-card.self{border-color:rgba(88,166,255,.3)}
.node-card.self:hover{border-color:rgba(88,166,255,.5)}
.node-card-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.node-card-header .name{font-size:11px;font-weight:600;color:var(--text)}
.node-card-header .ep{font-size:8px;color:var(--text3);font-family:monospace}
.node-card-header .self-tag{font-size:7px;padding:1px 5px;border-radius:4px;background:var(--accent);color:#fff;font-weight:600;letter-spacing:.2px}
.provider-section{margin-top:6px;padding-top:4px;border-top:1px solid var(--border)}
.provider-header{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.provider-url{font-size:7px;color:var(--text3);font-family:monospace}
.model-count{font-size:8px;color:var(--text2)}
.resource-model-count{font-size:10px;color:var(--accent);margin-left:8px}
.token-num{font-size:11px;font-weight:700;color:var(--text);font-family:monospace}
.token-num.big{font-size:16px}
select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:2px 6px;font-size:9px;outline:none;cursor:pointer;transition:border-color .2s}
select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(88,166,255,.1)}
select option{background:var(--surface);color:var(--text)}
.chart-wrap{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px;transition:border-color .2s}
.chart-wrap:hover{border-color:var(--border-light)}
.chart-header{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.chart-header .title{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.chart-header .spacer{flex:1}
.chart-header .info{font-size:8px;color:var(--text3)}
.sidebar-stat{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.sidebar-stat .sbox{flex:1;min-width:60px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px;text-align:center;transition:all .2s}
.sidebar-stat .sbox:hover{border-color:var(--border-light);transform:translateY(-1px)}
.sidebar-stat .sbox .num{font-size:15px;font-weight:700;line-height:1.2}
.sidebar-stat .sbox .lbl{font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.sidebar-stat .sbox.blue .num{color:var(--accent)}
.sidebar-stat .sbox.orange .num{color:var(--orange)}
.sidebar-stat .sbox.purple .num{color:var(--accent3)}
.sidebar-stat .sbox.cyan .num{color:var(--accent2)}
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.main-grid .full{grid-column:1/-1}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes pulse-ring{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.1;transform:scale(1.5)}}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes count-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card,.stat-box,.node-card,.sidebar .card{animation:fade-in .35s ease-out both}
.card:nth-child(1),.stat-box:nth-child(1){animation-delay:.02s}
.card:nth-child(2),.stat-box:nth-child(2){animation-delay:.05s}
.card:nth-child(3),.stat-box:nth-child(3){animation-delay:.08s}
.card:nth-child(4),.stat-box:nth-child(4){animation-delay:.11s}
.card:nth-child(5),.stat-box:nth-child(5){animation-delay:.14s}
</style>
</head>
<body>
<div class="header">
  <div class="status-dot ok" id="ollamaDot"></div>
  <h1>Hive Server Go</h1>
  <span class="badge" id="versionBadge">v1.7.0</span>
    <span class="badge mesh" id="meshBadge" style="display:none">MESH</span>
    <span class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">🌙</span>
    <div class="meta">
    <span id="serverId"></span>
    <span id="ollamaInfo">Ollama: checking...</span>
    <span id="modelInfo"></span>
    <span id="lastRefresh"></span>
  </div>
</div>

<div class="layout">
  <div class="main">
    <div class="main-grid">
      <div class="card full">
        <div class="stat-row" id="stats"></div>
      </div>

      <div class="card">
        <h2>Connected Clients <span class="count" id="nodeCount">0</span></h2>
        <div id="nodesTable"></div>
      </div>

      <div class="card">
        <h2>Job Queue <span class="count" id="queueCount">0</span></h2>
        <div id="queueProgress"></div>
        <div id="queueTable"></div>
      </div>

      <div class="card">
        <h2>Mesh Peers <span class="count" id="peerCount">0</span></h2>
        <div id="peersTable"></div>
      </div>

      <div class="card">
        <h2>Ollama Health</h2>
        <div id="ollamaHealth" style="font-size:11px;color:#8b949e">Checking...</div>
      </div>

      <div class="card full">
        <h2>Token Usage <span class="count" id="sideUsageCompact" style="font-size:13px;font-weight:400;color:#8b949e"></span></h2>
        <div class="sidebar-stat" id="sideUsage"></div>
        <div class="chart-wrap">
          <div class="chart-header">
          <span class="title">TPS</span>
          <span style="display:flex;gap:2px;margin-left:6px">
            <span class="chart-tab active" data-chart="line" onclick="setChartType('line')">Line</span>
            <span class="chart-tab" data-chart="hist" onclick="setChartType('hist')">Hist</span>
          </span>
          <select id="tpsModelSelect" onchange="loadTPSChart()">
            <option value="">All</option>
          </select>
          <span style="display:flex;gap:2px;margin-left:6px">
            <span class="range-tab active" data-range="3600" onclick="setTimeRange(3600)">1h</span>
            <span class="range-tab" data-range="86400" onclick="setTimeRange(86400)">24h</span>
            <span class="range-tab" data-range="259200" onclick="setTimeRange(259200)">3d</span>
            <span class="range-tab" data-range="604800" onclick="setTimeRange(604800)">7d</span>
            <span class="range-tab" data-range="2592000" onclick="setTimeRange(2592000)">30d</span>
            <span class="range-tab" data-range="0" onclick="setTimeRange(0)">Max</span>
          </span>
          <span class="spacer"></span>
          <span class="info" id="tpsRange"></span>
          </div>
          <canvas id="tpsChart" width="760" height="160" style="width:100%;height:140px"></canvas>
        </div>
        <div id="sideReports" style="max-height:180px;overflow-y:auto"></div>
      </div>

      <div class="card full">
        <div class="tabs">
          <button class="tab-btn active" data-tab="jobs">Recent Jobs</button>
          <button class="tab-btn" data-tab="resources">Resources</button>
          <button class="tab-btn" data-tab="audit">Audit Trail</button>
        </div>
        <div class="tab-content active" id="tab-jobs">
          <div id="jobsTable" style="max-height:280px;overflow-y:auto"></div>
        </div>
        <div class="tab-content" id="tab-resources">
          <div id="resourcesContent" style="max-height:320px;overflow-y:auto"></div>
        </div>
        <div class="tab-content" id="tab-audit">
          <div class="audit-controls">
            <input type="text" id="auditSearch" placeholder="Search requests..." style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:6px 12px;color:#e6edf3;font-size:12px;width:200px">
            <select id="auditCategory" style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:6px 12px;color:#e6edf3;font-size:12px">
              <option value="">All Categories</option>
              <option value="coding_agent">Coding Agent</option>
              <option value="openai_compat">OpenAI Compat</option>
              <option value="job_queue">Job Queue</option>
              <option value="mesh">Mesh</option>
              <option value="system">System</option>
            </select>
            <button onclick="loadAuditTrail()" style="background:#238636;border:none;border-radius:6px;padding:6px 16px;color:#fff;font-size:12px;cursor:pointer">Search</button>
            <span style="margin-left:auto;font-size:10px;color:#8b949e" id="auditCount">0 events</span>
          </div>
          <div id="auditTimeline" style="max-height:320px;overflow-y:auto;margin-top:12px"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="divider" id="divider"></div>
  <div class="sidebar">
    <div class="card" style="flex-shrink:0">
      <h2>Mesh Topology <span class="count" id="meshNodeCount">1</span> node(s)</h2>
      <div class="mesh-topo" id="meshTopo"><svg id="meshSvg"></svg></div>
    </div>
    <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div class="log-header">
        <span style="font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#8b949e;font-weight:600">Live Logs</span>
        <span style="display:flex;gap:3px;margin-left:8px" id="logFilters">
          <span class="log-filter active" data-level="" onclick="setLogFilter('')">All</span>
          <span class="log-filter" data-level="INFO" onclick="setLogFilter('INFO')">INFO</span>
          <span class="log-filter" data-level="WARN" onclick="setLogFilter('WARN')">WARN</span>
          <span class="log-filter" data-level="ERROR" onclick="setLogFilter('ERROR')">ERROR</span>
        </span>
        <span class="spacer"></span>
        <span style="font-size:9px;color:#6e7681" id="logCount">0</span>
        <button onclick="clearLogs()">Clear</button>
      </div>
      <div class="log-panel" id="logPanel" style="flex:1;max-height:none"></div>
    </div>
  </div>
</div>

<div class="overlay" id="auditOverlay">
  <div class="overlay-content">
    <button class="overlay-close" onclick="closeAuditOverlay()">✕</button>
    <div class="overlay-header">
      <h2 id="ovTitle">Request Details</h2>
      <div class="meta" id="ovMeta"></div>
    </div>
    <div class="overlay-body">
      <div class="overlay-section" id="ovRequestSection">
        <h3>📥 Request</h3>
        <div class="content-block" id="ovRequestContent"></div>
      </div>
      <div class="overlay-section" id="ovResponseSection">
        <h3>📤 Response</h3>
        <div class="content-block" id="ovResponseContent"></div>
      </div>
      <div class="overlay-section">
        <h3>📊 Event Timeline</h3>
        <div id="ovTimeline"></div>
      </div>
    </div>
  </div>
</div>

<script>
var TYPE_LABELS={generate:'Generate',chat:'Chat',embed:'Embed',list_models:'List Models',pull_model:'Pull Model',custom_prompt:'Custom Prompt'};
var lastLogTime=0,_statusData={},_peersData=[],logPolling=false,logFilter='',chartType='line',timeRange=3600;

async function refresh(){
  try{
    var r=await Promise.all([
      fetch('/api/status').then(function(r){return r.json()}),
      fetch('/api/clients').then(function(r){return r.json()}),
      fetch('/api/peers').then(function(r){return r.json()}).catch(function(){return {peers:[]}}),
      fetch('/api/ollama/health').then(function(r){return r.json()}).catch(function(){return {status:'unreachable'}}),
    ]);
    _statusData=r[0];_peersData=r[2].peers||[];
    renderStats(r[0]);renderNodes(r[1].clients||[]);
    renderJobs(r[0].queue||{});renderPeers(_peersData);
    renderMeshTopology(r[0],_peersData);renderOllamaHealth(r[3]);
    document.getElementById('lastRefresh').textContent='Updated '+new Date().toLocaleTimeString();
    loadJobs();
  }catch(e){console.error('Refresh:',e);}
}

function renderStats(s){
  var q=s.queue||{};
  document.getElementById('stats').innerHTML='<div class="stat-box blue"><div class="num">'+(q.max_concurrent||0)+'</div><div class="lbl">Workers</div></div><div class="stat-box orange"><div class="num">'+(q.pending||0)+'</div><div class="lbl">Queued</div></div><div class="stat-box blue"><div class="num">'+(q.running||0)+'</div><div class="lbl">Running</div></div><div class="stat-box green"><div class="num">'+(q.completed_recent||0)+'</div><div class="lbl">Done (1h)</div></div><div class="stat-box"><div class="num">'+(s.clients||0)+'/'+(s.max_clients||0)+'</div><div class="lbl">Clients</div></div><div class="stat-box purple"><div class="num">'+(s.peers||0)+'</div><div class="lbl">Peers</div></div>';
  document.getElementById('ollamaInfo').textContent='Ollama: '+(s.ollama_url||'');
  getServerIPs().then(function(ips){document.getElementById('modelInfo').textContent=ips;});
  document.getElementById('serverId').textContent=s.server_id||'';
  document.getElementById('versionBadge').textContent='v'+(s.version||'1.0.0');
  document.getElementById('ollamaDot').className='status-dot '+(s.queue?'ok':'err');
  document.getElementById('meshBadge').style.display=s.mesh_enabled?'inline':'none';
}

function renderNodes(clients){
  document.getElementById('nodeCount').textContent=clients.length;
  if(!clients.length){document.getElementById('nodesTable').innerHTML='<div class="empty">No clients connected</div>';return;}
  var html='<table><tr><th>Status</th><th>Client ID</th><th>Name</th><th>Jobs</th><th>Last Seen</th></tr>';
  clients.forEach(function(c){
    var age=Date.now()/1000-c.last_heartbeat;
    var status=age<120?'connected':age<300?'stale':'disconnected';
    html+='<tr><td><span class="dot '+status+'"></span>'+status+'</td><td style="font-family:monospace;font-size:10px">'+esc(c.client_id)+'</td><td>'+esc(c.name)+'</td><td>'+c.jobs_submitted+' sub / '+c.jobs_completed+' done</td><td class="job-time">'+fmtDuration(age)+' ago</td></tr>';
  });
  html+='</table>';
  document.getElementById('nodesTable').innerHTML=html;
}

async function loadJobs(){
  try{
    var r=await fetch('/api/jobs').then(function(r){return r.json()});
    renderJobTable(r.jobs||[]);
  }catch(e){}
}

function renderJobs(q){
  document.getElementById('queueCount').textContent=(q.pending||0)+(q.running||0);
  var maxW=q.max_concurrent||2;
  var pct=maxW?Math.round(((q.running||0)/maxW)*100):0;
  var color=(q.running||0)>0?'#58a6ff':'#30363d';
  document.getElementById('queueProgress').innerHTML='<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+color+'"></div></div><div class="progress-label">'+(q.running||0)+' / '+maxW+' workers</div></div>';
}

function renderJobTable(jobs){
  if(!jobs||!jobs.length){document.getElementById('jobsTable').innerHTML='<div class="empty">No jobs</div>';return;}
  var html='<table><tr><th>Status</th><th>Type</th><th>Client</th><th>Tokens</th><th>TPS</th><th>Duration</th><th>ID</th></tr>';
  jobs.slice(0,50).forEach(function(j){
    var type=TYPE_LABELS[j.job_type]||j.job_type;
    var dur=j.completed_at&&j.started_at?fmtDuration(j.completed_at-j.started_at):j.started_at?fmtDuration(Date.now()/1000-j.started_at)+'...':'—';
    var isMesh=j.id&&j.id.startsWith('mesh:');
    var route=isMesh?' <span class="status-tag mesh">mesh</span>':'';
    var toks='';
    if(j.total_tokens){toks=j.prompt_tokens+'p/'+j.completion_tokens+'c';}else{toks='—';}
    var tps=j.tokens_per_second?fmtTPS(j.tokens_per_second):'—';
    html+='<tr><td><span class="status-tag '+j.status+'">'+j.status+'</span>'+route+'</td><td class="job-type">'+esc(type)+'</td><td class="job-time">'+esc(j.client_id||'')+'</td><td style="font-size:10px;font-family:monospace">'+toks+'</td><td class="token-num" style="font-size:10px;color:#f0883e">'+tps+'</td><td class="job-time">'+dur+'</td><td class="job-id" title="'+esc(j.id)+'">'+esc(j.id)+'</td></tr>';
  });
  html+='</table>';
  document.getElementById('jobsTable').innerHTML=html;
}

function renderPeers(peers){
  document.getElementById('peerCount').textContent=peers.length;
  if(!peers.length){document.getElementById('peersTable').innerHTML='<div class="empty">No peers discovered</div>';return;}
  var html='<table><tr><th>Status</th><th>Server</th><th>Model</th><th>Load</th><th>Queue</th><th>Capacity</th></tr>';
  peers.forEach(function(p){
    var status=p.alive?'connected':'stale';
    var loadPct=Math.round(p.load*100);
    var loadColor=loadPct<50?'#2ea043':loadPct<80?'#f0883e':'#f85149';
    html+='<tr><td><span class="dot '+status+'"></span>'+status+'</td><td style="font-family:monospace;font-size:10px">'+esc(p.server_id)+'</td><td style="font-size:9px">'+esc(p.ollama_model)+'</td><td><span style="color:'+loadColor+'">'+loadPct+'%</span> <span class="peer-load-bar"><span class="peer-load-fill" style="width:'+loadPct+'%;background:'+loadColor+'"></span></span></td><td style="font-size:10px">'+p.running_jobs+' run / '+p.pending_jobs+' wait</td><td>'+p.available_capacity+'/'+p.max_concurrent+'</td></tr>';
  });
  html+='</table>';
  document.getElementById('peersTable').innerHTML=html;
}

function renderMeshTopology(status,peers){
  var svg=document.getElementById('meshSvg');
  var container=document.getElementById('meshTopo');
  if(!svg||!container)return;
  var W=container.clientWidth||700,H=container.clientHeight||200;
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  var totalNodes=1+peers.length;
  document.getElementById('meshNodeCount').textContent=totalNodes;
  var cx=W/2,cy=H/2,selfR=Math.min(W,H)*0.07,peerR=selfR*0.8;
  var html='';
  if(!peers.length){
    html+='<circle cx="'+cx+'" cy="'+cy+'" r="'+selfR+'" fill="#1f6feb" stroke="#58a6ff" stroke-width="2"/>';
    html+='<text x="'+cx+'" y="'+(cy+3)+'" text-anchor="middle" fill="#8b949e" font-size="11">Standalone</text>';
    html+='<text x="'+cx+'" y="'+(cy-selfR-10)+'" text-anchor="middle" font-size="10" fill="#e1e4e8">'+esc(status.server_id||'this')+'</text>';
    svg.innerHTML=html;return;
  }
  var ringR=Math.min(W,H)*0.35;
  peers.forEach(function(p,i){
    var angle=(2*Math.PI*i/peers.length)-Math.PI/2;
    var px=cx+ringR*Math.cos(angle),py=cy+ringR*Math.sin(angle);
    var loadPct=p.load||0;
    var rColor=loadPct<0.5?'#2ea043':loadPct<0.8?'#f0883e':'#f85149';
    var isActive=p.running_jobs>0;
    var cls=p.alive?'#8957e5':'#30363d';
    var linkCls=isActive?'#58a6ff':'#30363d';
    html+='<line x1="'+cx+'" y1="'+cy+'" x2="'+px+'" y2="'+py+'" stroke="'+linkCls+'" stroke-width="'+(isActive?2:1.5)+'" stroke-dasharray="'+(isActive?'none':'4 2')+'"/>';
    html+='<circle cx="'+px+'" cy="'+py+'" r="'+peerR+'" fill="'+cls+'" stroke="#bc8cff" stroke-width="'+(p.alive?2:1)+'"/>';
    var arc=loadPct*2*Math.PI*peerR;
    html+='<circle cx="'+px+'" cy="'+py+'" r="'+(peerR+4)+'" fill="none" stroke="'+rColor+'" stroke-width="3" stroke-linecap="round" stroke-dasharray="'+arc+' '+(2*Math.PI*peerR)+'" transform="rotate(-90,'+px+','+py+')" style="opacity:0.7"/>';
    html+='<text x="'+px+'" y="'+(py+3)+'" text-anchor="middle" font-size="9" fill="#e1e4e8">'+esc(p.server_id)+'</text>';
    html+='<text x="'+px+'" y="'+(py+peerR+18)+'" text-anchor="middle" fill="#8b949e" font-size="9">'+Math.round(loadPct*100)+'% load</text>';
    if(isActive) html+='<text x="'+px+'" y="'+(py-peerR-6)+'" text-anchor="middle" fill="#58a6ff" font-size="9">'+p.running_jobs+' active</text>';
  });
  html+='<circle cx="'+cx+'" cy="'+cy+'" r="'+selfR+'" fill="#1f6feb" stroke="#58a6ff" stroke-width="2" style="animation:pulse 3s ease-in-out infinite"/>';
  html+='<text x="'+cx+'" y="'+(cy+3)+'" text-anchor="middle" font-size="10" fill="#e1e4e8">'+esc(status.server_id||'this')+'</text>';
  html+='<text x="'+cx+'" y="'+(cy+selfR+16)+'" text-anchor="middle" fill="#58a6ff" font-size="9">'+(status.queue?status.queue.running||0:0)+' active</text>';
  svg.innerHTML=html;
}

function renderOllamaHealth(h){
  var el=document.getElementById('ollamaHealth');
  if(h.status==='healthy'){
    el.innerHTML='<span style="color:#2ea043">Healthy</span> - Models: '+esc((h.models||[]).join(', '));
  }else{
    el.innerHTML='<span style="color:#f85149">Unhealthy</span> - '+esc(h.error||'Unknown');
  }
}

async function loadResources(){
  try{
    var r=await Promise.all([
      fetch('/api/nodes').then(function(r){return r.json()}),
      fetch('/api/providers').then(function(r){return r.json()}),
      fetch('/api/models').then(function(r){return r.json()}),
    ]);
    renderResources(r[0].nodes||[],r[1].providers||[],r[2].models||[]);
  }catch(e){}
}

function renderResources(nodes,providerTypes,models){
  var el=document.getElementById('resourcesContent');
  if(!nodes.length&&!models.length){
    el.innerHTML='<div class="empty">No nodes or models detected. Start Ollama, LM Studio, or vLLM on this machine or connect mesh peers.</div>';
    return;
  }
  var html='';
  var modelCount=models.length;
  html+='<div style="margin-bottom:8px;font-size:10px;color:#8b949e">'+nodes.length+' node(s) · '+providerTypes.length+' provider type(s) · <span style="color:#58a6ff;font-weight:600">'+modelCount+' model(s)</span></div>';
  nodes.forEach(function(n){
    var selfCls=n.is_self?' self':'';
    var selfTag=n.is_self?' <span class="self-tag">SELF</span>':'';
    var statusDot=n.alive?'<span class="dot connected"></span>':'<span class="dot disconnected"></span>';
    var totalModels=0;
    if(n.providers)n.providers.forEach(function(p){totalModels+=p.models?p.models.length:0;});

async function loadTPSChart(){
  try{
    var sel=document.getElementById('tpsModelSelect');

function drawTPSChart(pts){
  var canvas=document.getElementById('tpsChart');
  var ctx=canvas.getContext('2d');
  var rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=(rect.width||760)*2;canvas.height=160*2;
  ctx.scale(2,2);
  var W=canvas.width/2,H=canvas.height/2;
  ctx.clearRect(0,0,W,H);
  document.getElementById('tpsRange').textContent=pts.length+' pts';
  if(!pts.length){
    ctx.fillStyle='#6e7681';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('No TPS data',W/2,H/2);return;
  }
  var maxTPS=0,minTPS=Infinity;
  pts.forEach(function(p){if(p.tps>maxTPS)maxTPS=p.tps;if(p.tps<minTPS)minTPS=p.tps;});
  if(maxTPS===0)maxTPS=1;
  var range=maxTPS-minTPS||1;
  var pad=10,topPad=14,bottomPad=22,leftPad=42,rightPad=10;
  var plotW=W-leftPad-rightPad,plotH=H-topPad-bottomPad;
  var firstT=pts[0].timestamp,lastT=pts[pts.length-1].timestamp;
  var timeRange=lastT-firstT||1;
  function x(t){return leftPad+((t-firstT)/timeRange)*plotW;}
  function y(v){return topPad+plotH-((v-minTPS)/range)*plotH;}

  var grad=ctx.createLinearGradient(0,topPad,0,topPad+plotH);
  grad.addColorStop(0,'rgba(57,210,192,0.08)');grad.addColorStop(1,'rgba(57,210,192,0.01)');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.moveTo(x(pts[0].timestamp),topPad+plotH);
  pts.forEach(function(p){ctx.lineTo(x(p.timestamp),y(p.tps));});
  ctx.lineTo(x(pts[pts.length-1].timestamp),topPad+plotH);ctx.closePath();ctx.fill();

  ctx.strokeStyle='#21262d';ctx.lineWidth=0.5;
  var steps=4;
  for(var i=0;i<=steps;i++){
    var v=minTPS+(range*i/steps);
    var yy=y(v);
    ctx.beginPath();ctx.moveTo(leftPad,yy);ctx.lineTo(leftPad+plotW,yy);ctx.stroke();
    ctx.fillStyle='#6e7681';ctx.font='8px monospace';ctx.textAlign='right';
    ctx.fillText(v.toFixed(1),leftPad-4,yy+3);
  }
  var timeSteps=Math.min(5,pts.length);
  for(var i=0;i<=timeSteps;i++){
    var idx=Math.floor((i/timeSteps)*(pts.length-1));
    var tt=pts[idx].timestamp;
    ctx.fillStyle='#6e7681';ctx.font='7px monospace';ctx.textAlign='center';
    ctx.fillText(new Date(tt*1000).toLocaleTimeString(),x(tt),H-4);
  }

  ctx.strokeStyle='#39d2c0';ctx.lineWidth=1.5;ctx.lineJoin='round';
  ctx.beginPath();
  pts.forEach(function(p,i){
    var xx=x(p.timestamp),yy=y(p.tps);
    if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy);
  });
  ctx.stroke();

  ctx.fillStyle='#39d2c0';
  pts.forEach(function(p){
    ctx.beginPath();ctx.arc(x(p.timestamp),y(p.tps),2,0,Math.PI*2);ctx.fill();
  });

  var last=pts[pts.length-1];
  ctx.fillStyle='#8b949e';ctx.font='8px sans-serif';ctx.textAlign='right';
  ctx.fillText('max: '+maxTPS.toFixed(1)+' tok/s',leftPad+plotW,topPad+10);
  ctx.fillStyle='#e1e4e8';ctx.font='9px sans-serif';ctx.textAlign='left';
  ctx.fillText(last.tps.toFixed(1)+' tok/s',x(last.timestamp)+4,y(last.timestamp)-4);
  ctx.fillStyle='#6e7681';ctx.font='7px sans-serif';
  ctx.fillText('now',x(last.timestamp)+4,y(last.timestamp)+8);
}

function drawTPSHistogram(hist){
  var canvas=document.getElementById('tpsChart');
  var ctx=canvas.getContext('2d');
  var rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=(rect.width||760)*2;canvas.height=160*2;
  ctx.scale(2,2);
  var W=canvas.width/2,H=canvas.height/2;
  ctx.clearRect(0,0,W,H);
  document.getElementById('tpsRange').textContent=hist.count+' samples';
  if(!hist.bins||!hist.bins.length){
    ctx.fillStyle='#6e7681';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('No TPS data',W/2,H/2);return;
  }

  var bins=hist.bins;
  var maxCount=0;
  bins.forEach(function(b){if(b.count>maxCount)maxCount=b.count;});
  maxCount=Math.max(1,maxCount);

  var pad=10,topPad=14,bottomPad=22,leftPad=42,rightPad=14;
  var plotW=W-leftPad-rightPad,plotH=H-topPad-bottomPad;
  var barW=plotW/bins.length;

  ctx.strokeStyle='#21262d';ctx.lineWidth=0.5;
  var steps=4;
  for(var i=0;i<=steps;i++){
    var v=(maxCount*i/steps);
    var yy=topPad+plotH-(v/maxCount)*plotH;
    ctx.beginPath();ctx.moveTo(leftPad,yy);ctx.lineTo(leftPad+plotW,yy);ctx.stroke();
    ctx.fillStyle='#6e7681';ctx.font='8px monospace';ctx.textAlign='right';
    ctx.fillText(Math.round(v),leftPad-4,yy+3);
  }

  ctx.fillStyle='rgba(57,210,192,0.6)';
  bins.forEach(function(b,i){
    var barH=(b.count/maxCount)*plotH;
    var x=leftPad+i*barW+1;
    var w=Math.max(1,barW-2);
    var y=topPad+plotH-barH;
    ctx.fillRect(x,y,w,barH);
  });

  var labelIdx=[0,Math.floor(bins.length/4),Math.floor(bins.length/2),Math.floor(3*bins.length/4),bins.length-1];
  ctx.fillStyle='#6e7681';ctx.font='7px monospace';ctx.textAlign='center';
  labelIdx.forEach(function(i){
    var val=bins[i].min_tps.toFixed(1);
    ctx.fillText(val,leftPad+i*barW+barW/2,H-3);
  });

  ctx.fillStyle='#8b949e';ctx.font='8px sans-serif';ctx.textAlign='right';
  ctx.fillText('avg: '+hist.avg_tps.toFixed(1)+' · median: '+hist.median_tps.toFixed(1)+' tok/s  |  range: '+hist.min_tps.toFixed(1)+' – '+hist.max_tps.toFixed(1),leftPad+plotW,topPad+10);
  ctx.fillStyle='#6e7681';ctx.font='7px sans-serif';ctx.textAlign='center';
  ctx.fillText('TPS bucket',W/2,H-1);
}

var auditSearchTimeout=null;
async function loadAuditTrail(){
  var search=document.getElementById('auditSearch').value;
  var category=document.getElementById('auditCategory').value;
  
  var url='/api/audit/recent?limit=200';
  if(category)url+='&category='+encodeURIComponent(category);
  
  try{
    var r=await fetch(url).then(function(r){return r.json()});
    var events=r.events||[];
    
    // Filter out response-only events without useful data, and dashboard polling
    var filtered=events.filter(function(e){
      if(e.event_type==='response' && !e.path && !e.model && !e.prompt) return false;
      return true;
    });
    
    if(search){
      var s=search.toLowerCase();
      filtered=filtered.filter(function(e){
        return (e.path||'').toLowerCase().includes(s)||
               (e.model||'').toLowerCase().includes(s)||
               (e.content||'').toLowerCase().includes(s)||
               (e.prompt||'').toLowerCase().includes(s)||
               (e.query||'').toLowerCase().includes(s)||
               (e.job_type||'').toLowerCase().includes(s)||
               (e.error_message||'').toLowerCase().includes(s)||
               (e.method||'').toLowerCase().includes(s)||
               (e.request_id||'').toLowerCase().includes(s);
      });
    }
    
    renderAuditTimeline(filtered);
  }catch(e){
    document.getElementById('auditTimeline').innerHTML='<div class="empty">Failed to load audit trail</div>';
  }
}

function renderAuditTimeline(events){
  var el=document.getElementById('auditTimeline');
  if(!events||!events.length){
    el.innerHTML='<div class="empty">No audit events found</div>';
    document.getElementById('auditCount').textContent='0 events';
    return;
  }
  
  // Group events by request_id
  var requests={};
  events.forEach(function(e){
    if(!requests[e.request_id])requests[e.request_id]=[];
    requests[e.request_id].push(e);
  });
  
  // Sort: requests with chat completions or errors first, then by most recent
  var requestIds=Object.keys(requests).sort(function(a,b){
    var aHasImportant=requests[a].some(function(e){return e.path&&e.path.indexOf('/v1/chat')>=0||e.event_type==='error'});
    var bHasImportant=requests[b].some(function(e){return e.path&&e.path.indexOf('/v1/chat')>=0||e.event_type==='error'});
    if(aHasImportant&&!bHasImportant) return -1;
    if(!aHasImportant&&bHasImportant) return 1;
    var lastA=requests[a][requests[a].length-1];
    var lastB=requests[b][requests[b].length-1];
    return new Date(lastB.created_at)-new Date(lastA.created_at);
  });
  
  var html='';
  var totalEvents=0;
  
  requestIds.forEach(function(reqId){
    var reqEvents=requests[reqId];
    totalEvents+=reqEvents.length;
    
    var firstEvent=reqEvents[0];
    var lastEvent=reqEvents[reqEvents.length-1];
    var durationMs=0;
    if(reqEvents.length>1){
      durationMs=new Date(lastEvent.created_at)-new Date(firstEvent.created_at);
    }
    
    var eventCounts={};
    reqEvents.forEach(function(e){
      eventCounts[e.event_type]=(eventCounts[e.event_type]||0)+1;
    });
    
    var models=[];
    var categories=[];
    var hasError=reqEvents.some(function(e){return e.event_type==='error'||e.error_message;});
    var isChatCompletion=reqEvents.some(function(e){return e.path&&e.path.indexOf('/v1/chat')>=0;});
    var isStreaming=reqEvents.some(function(e){return e.event_type==='request'&&reqEvents.length===1;});
    
    reqEvents.forEach(function(e){
      if(e.model&&models.indexOf(e.model)===-1)models.push(e.model);
      if(e.category&&categories.indexOf(e.category)===-1)categories.push(e.category);
    });
    
    var highlightClass='';
    if(isChatCompletion) highlightClass=' highlight-chat';
    if(hasError) highlightClass=' highlight-error';
    if(isStreaming) highlightClass=' highlight-streaming';
    
    html+='<div class="audit-request'+highlightClass+'" data-request-id="'+esc(reqId)+'">';
    html+='<div class="audit-request-header">';
    html+='<span class="audit-toggle" onclick="event.stopPropagation();toggleAuditRequest(this.parentElement.parentElement.querySelector(\'.audit-request-details\'))">▶</span>';
    
    // Make the main content area clickable to open overlay
    html+='<div class="audit-request-body" onclick="openAuditDetail(\''+esc(reqId)+'\')" style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;cursor:pointer">';
    
    // Show method badge prominently
    if(firstEvent.method){
      html+='<span class="audit-request-method">'+esc(firstEvent.method)+'</span>';
    }
    
    // Show path/model prominently
    var displayPath=firstEvent.path||reqId;
    var displayLabel=displayPath;
    if(models.length) displayLabel+=' ('+esc(models.join(', '))+')';
    html+='<span class="audit-request-path">'+esc(displayLabel)+'</span>';
    
    html+='<span class="audit-request-time">'+fmtTime(new Date(firstEvent.created_at).getTime()/1000)+'</span>';
    if(durationMs>0) html+='<span class="audit-request-duration">'+fmtDuration(durationMs/1000)+'</span>';
    html+='<span class="audit-request-events">'+reqEvents.length+'</span>';
    
    // Show prompt preview inline
    var firstPrompt=reqEvents[0].prompt||'';
    if(firstPrompt){
      var preview=firstPrompt.length>60?firstPrompt.substring(0,60)+'...':firstPrompt;
      html+='<span class="audit-request-prompt">'+esc(preview)+'</span>';
    }
    
    html+='</div>'; // close audit-request-body
    html+='</div>'; // close audit-request-header

    html+='<div class="audit-request-details" style="display:none">';
    html+='<div class="audit-request-meta">';
    if(categories.length)html+='<span class="audit-tag">'+esc(categories.join(', '))+'</span>';
    if(models.length)html+='<span class="audit-tag model">'+esc(models.join(', '))+'</span>';
    if(isStreaming)html+='<span class="audit-tag streaming">STREAMING</span>';
    html+='</div>';
    
    html+='<div class="audit-timeline">';
    reqEvents.forEach(function(e,i){
      var eventType=e.event_type;
      var icon='⚡';
      var color='#58a6ff';
      if(eventType==='request'){icon='📥';color='#39d2c0';}
      else if(eventType==='response'){icon='📤';color='#58a6ff';}
      else if(eventType==='error'){icon='❌';color='#f85149';}
      else if(eventType==='forward'){icon='🔀';color='#bc8cff';}
      else if(eventType==='cache_hit'){icon='💾';color='#f0883e';}
      else if(eventType==='job_submit'){icon='📋';color='#58a6ff';}
      else if(eventType==='job_complete'){icon='✅';color='#2ea043';}
      
      html+='<div class="audit-event">';
      html+='<div class="audit-event-dot" style="background:'+color+'"></div>';
      html+='<div class="audit-event-line"></div>';
      html+='<div class="audit-event-content">';
      html+='<div class="audit-event-header">';
      html+='<span class="audit-event-icon">'+icon+'</span>';
      html+='<span class="audit-event-type" style="color:'+color+'">'+eventType.toUpperCase()+'</span>';
      html+='<span class="audit-event-time">'+fmtTime(new Date(e.created_at).getTime()/1000)+'</span>';
      if(e.status_code)html+='<span class="audit-event-status" style="color:'+(e.status_code<400?'#2ea043':'#f85149')+'">'+e.status_code+'</span>';
      if(e.duration_ms)html+='<span class="audit-event-duration">'+e.duration_ms.toFixed(0)+'ms</span>';
      html+='</div>';
      
      if(e.content){
        var content=e.content;
        if(content.length>200)content=content.substring(0,200)+'...';
        html+='<div class="audit-event-content-text">'+esc(content)+'</div>';
      }
      
      if(e.error_message){
        html+='<div class="audit-event-error">'+esc(e.error_message)+'</div>';
      }
      
      html+='</div>';
      html+='</div>';
    });
    html+='</div>';
    html+='</div>';
    html+='</div>';
  });
  
  el.innerHTML=html;
  document.getElementById('auditCount').textContent=totalEvents+' events in '+requestIds.length+' requests';
}

async function pollLogs(){

  while(true){
    try{
      var r=await fetch('/api/logs?since='+lastLogTime).then(function(r){return r.json()});
      var logs=r.logs||[];
      if(logs.length){
        lastLogTime=logs[logs.length-1].epoch||Date.now()/1000;
        var panel=document.getElementById('logPanel');
        if(!panel._allLogs)panel._allLogs=[];
        logs.forEach(function(l){
          var d=document.createElement('div');d.className='log-line';
          d.innerHTML='<span class="ts">'+fmtTime(l.epoch)+'</span><span class="lvl '+l.level+'">'+l.level+'</span><span class="msg">'+esc(cleanLogLine(l.message)).split('\n')[0]+'</span>';
          panel._allLogs.push(d);
          if(!logFilter||l.level===logFilter)panel.appendChild(d);
        });
        panel.scrollTop=panel.scrollHeight;
        if(panel._allLogs.length>500){
          var remove=panel._allLogs.splice(0,panel._allLogs.length-400);
          remove.forEach(function(el){if(el.parentNode)el.remove();});
        }
        document.getElementById('logCount').textContent=panel.children.length;
      }
    }catch(e){}
    await new Promise(function(r){setTimeout(r,1000)});
  }
}

async function clearLogs(){
  await fetch('/api/logs/clear',{method:'POST'});
  var panel=document.getElementById('logPanel');
  panel.innerHTML='';
  panel._allLogs=[];
  document.getElementById('logCount').textContent='0';
  lastLogTime=0;
}

function sideRefresh(){
  loadSideReports();
  loadTPSChart();
}

function initDivider(){
  var divider=document.getElementById('divider');
  var layout=document.querySelector('.layout');
  var sidebar=document.querySelector('.sidebar');
  var startX=0,startW=0;
  var saved=localStorage.getItem('hiveSidebarWidth');
  if(saved){document.documentElement.style.setProperty('--sidebar-width',saved+'px');}
  divider.addEventListener('mousedown',function(e){
    e.preventDefault();divider.classList.add('active');
    startX=e.clientX;startW=sidebar.offsetWidth;
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
  });
  document.addEventListener('mousemove',function(e){
    if(!divider.classList.contains('active'))return;
    var w=startW-(e.clientX-startX);
    w=Math.max(280,Math.min(w,800));
    document.documentElement.style.setProperty('--sidebar-width',w+'px');
  });
  document.addEventListener('mouseup',function(){
    if(!divider.classList.contains('active'))return;
    divider.classList.remove('active');
    document.body.style.cursor='';
    document.body.style.userSelect='';
    var w=sidebar.offsetWidth;
    localStorage.setItem('hiveSidebarWidth',w);
  });
}
initDivider();initTabs();refresh();sideRefresh();
setInterval(refresh,3000);setInterval(loadJobs,5000);setInterval(sideRefresh,6000);
pollLogs();

// Theme toggle
var _theme=localStorage.getItem('hiveTheme')||'dark';
function initTheme(){
  if(_theme==='light'){document.documentElement.classList.add('light-theme');document.getElementById('themeToggle').textContent='☀️';}
}
function toggleTheme(){
  _theme=_theme==='dark'?'light':'dark';
  document.documentElement.classList.toggle('light-theme',_theme==='light');
  document.getElementById('themeToggle').textContent=_theme==='light'?'☀️':'🌙';

}
initTheme();

// Audit Trail Overlay Functions
var _ovDetail=null;
async function openAuditDetail(requestId){
  try{
    var resp=await fetch('/api/audit/detail/'+encodeURIComponent(requestId)).then(function(r){return r.json()});
    _ovDetail=resp;
    renderOverlay(resp);
    document.getElementById('auditOverlay').classList.add('active');
    document.body.style.overflow='hidden';
  }catch(e){
    console.error('Failed to load audit detail:',e);
  }
}

function closeAuditOverlay(){
  document.getElementById('auditOverlay').classList.remove('active');
  document.body.style.overflow='';
  _ovDetail=null;
}

// Close on Escape key
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeAuditOverlay();
});

// Close on backdrop click
document.getElementById('auditOverlay').addEventListener('click',function(e){
  if(e.target===this)closeAuditOverlay();
});

function renderOverlay(detail){
  var events=detail.events||[];
  var firstReq=events.find(function(e){return e.event_type==='request'});
  var firstResp=events.find(function(e){return e.event_type==='response'});
  var activeStream=firstReq&&!firstResp;
  
  // Title
  var title=firstReq?(firstReq.method||'')+' '+(firstReq.path||'')+' — '+(firstReq.model||'')+(activeStream?' (active)':''):'Request Details';
  document.getElementById('ovTitle').textContent=title;
  
  // Meta
  var metaHtml='<span>🆔 '+esc(detail.request_id)+'</span>'+
    '<span style="color:'+(activeStream?'var(--accent3)':'var(--text3)')+'">⏱ '+(activeStream?'Streaming...':fmtDuration((detail.total_duration_ms||0)/1000))+'</span>'+
    '<span>📊 '+detail.total_events+' event(s)</span>';
  if(detail.model)metaHtml+='<span>🔤 '+esc(detail.model)+'</span>';
  if(detail.status_code)metaHtml+='<span style="color:'+(detail.status_code<400?'var(--green)':'var(--red)')+'">'+(detail.status_code<400?'✓':'✗')+' '+detail.status_code+'</span>';
  if(detail.token_count)metaHtml+='<span>🔢 '+detail.token_count+' tokens</span>';
  document.getElementById('ovMeta').innerHTML=metaHtml;
  
  // Request section
  var reqSection=document.getElementById('ovRequestSection');
  if(firstReq&&firstReq.prompt){
    reqSection.style.display='';
    var reqContent='';
    if(firstReq.overrides){
      try{
        reqContent=JSON.stringify(firstReq.overrides,null,2);
      }catch(e){reqContent=String(firstReq.overrides);}
    }else{
      reqContent='Prompt: '+esc(firstReq.prompt);
    }
    if(firstReq.query)reqContent+='\n\nQuery: '+firstReq.query;
    document.getElementById('ovRequestContent').textContent=reqContent;
  }else{
    reqSection.style.display='none';
  }
  
  // Response section
  var respSection=document.getElementById('ovResponseSection');
  if(firstResp&&firstResp.content){
    respSection.style.display='';
    document.getElementById('ovResponseContent').textContent=firstResp.content;
  }else if(activeStream){
    respSection.style.display='';
    document.getElementById('ovResponseContent').textContent='⏳ Response streaming in progress...';
  }else{
    respSection.style.display='none';
  }
  
  // Timeline
  var tlHtml='<div class="overlay-timeline">';
  events.forEach(function(e,i){
    var icon,color,bgColor;
    switch(e.event_type){
      case 'request':icon='📥';color='#39d2c0';bgColor='rgba(57,210,192,.2)';break;
      case 'response':icon='📤';color='#58a6ff';bgColor='rgba(88,166,255,.2)';break;
      case 'error':icon='❌';color='#f85149';bgColor='rgba(248,81,73,.2)';break;
      case 'job_complete':icon='✅';color='#2ea043';bgColor='rgba(46,160,67,.2)';break;
      case 'job_error':icon='⚠️';color='#f0883e';bgColor='rgba(240,136,62,.2)';break;
      case 'forward':icon='🔀';color='#bc8cff';bgColor='rgba(188,140,255,.2)';break;
      case 'cache_hit':icon='💾';color='#f0883e';bgColor='rgba(240,136,62,.2)';break;
      default:icon='⚡';color='#6e7681';bgColor='rgba(110,118,129,.2)';
    }
    
    tlHtml+='<div class="overlay-timeline-event">';
    tlHtml+='<div class="ov-tl-dot" style="background:'+color+';box-shadow:0 0 6px '+bgColor+'">'+'</div>';
    tlHtml+='<div class="ov-tl-line"></div>';
    tlHtml+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">';
    tlHtml+='<span>'+icon+'</span>';
    tlHtml+='<span style="font-size:11px;font-weight:600;color:'+color+'">'+e.event_type.toUpperCase()+'</span>';
    tlHtml+='<span style="font-size:9px;color:var(--text3);font-family:monospace">'+fmtTime(new Date(e.created_at).getTime()/1000)+'</span>';
    if(e.status_code)tlHtml+='<span style="font-size:9px;color:'+(e.status_code<400?'var(--green)':'var(--red)')+'">'+e.status_code+'</span>';
    if(e.duration_ms)tlHtml+='<span style="font-size:9px;color:var(--text3);font-family:monospace">'+e.duration_ms.toFixed(0)+'ms</span>';
    tlHtml+='</div>';
    
    // Stats
    var stats=[];
    if(e.model)stats.push('🔤 '+esc(e.model));
    if(e.job_type)stats.push('📋 '+esc(e.job_type));
    if(e.job_id)stats.push('🆔 '+esc(e.job_id));
    if(e.token_count)stats.push('🔢 '+e.token_count+' tokens');
    if(stats.length){
      tlHtml+='<div class="ov-tl-stats">'+stats.map(function(s){return '<span>'+s+'</span>'}).join('')+'</div>';
    }
    
    // Content / error detail (expandable)
      var hasContent=e.content||e.error_message||e.prompt;
      if(hasContent){
        tlHtml+='<span class="ov-tl-expand" onclick="toggleOvEvent(this)">▶ Show Details</span>';
        var bodyContent='';
        if(e.error_message)bodyContent='❌ Error: '+esc(e.error_message);
        else if(e.prompt)bodyContent=esc(e.prompt);
        else bodyContent=esc(e.content);
        tlHtml+='<div class="ov-tl-body">'+bodyContent+'</div>';
      }
    
    tlHtml+='</div>';
  });
  tlHtml+='</div>';
  document.getElementById('ovTimeline').innerHTML=tlHtml;
}

function toggleOvEvent(el){
  var body=el.nextElementSibling;
  if(body&&body.classList.contains('ov-tl-body')){
    var hidden=body.style.display==='none'||body.style.display==='';
    body.style.display=hidden?'block':'none';
    el.textContent=hidden?'▼ Hide Details':'▶ Show Details';
  }
}
</script>
